<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bradicoin DApp | BRD Token | Multi-Chain Cyberpunk Dashboard</title>
  <!-- Google Fonts: Orbitron -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 & Chart.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Orbitron', monospace;
      background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
      color: #e0e5ff;
      min-height: 100vh;
      padding: 1.5rem;
      letter-spacing: 0.5px;
    }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0a0c1a; box-shadow: inset 0 0 2px #00ffff22; }
    ::-webkit-scrollbar-thumb { background: #00ffffaa; border-radius: 8px; }
    .app-container { max-width: 1500px; margin: 0 auto; }
    .top-bar {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      gap: 1rem; margin-bottom: 2rem; padding: 1rem 1.8rem;
      background: rgba(12, 20, 35, 0.75); backdrop-filter: blur(12px);
      border-radius: 2rem; border: 1px solid #4d3effaa;
      box-shadow: 0 0 16px #3a0ca3aa;
    }
    .logo-area { display: flex; align-items: center; gap: 1rem; }
    .logo-placeholder {
      width: 48px; height: 48px; background: linear-gradient(135deg, #a855f7, #00f2ff);
      border-radius: 1rem; display: flex; align-items: center; justify-content: center;
      font-weight: bold; font-size: 1.5rem; color: #0a0f1e; box-shadow: 0 0 12px #a855f7;
    }
    .logo-area h1 { font-size: 1.8rem; background: linear-gradient(135deg, #a855f7, #00f2ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .wallet-actions { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; }
    .cyber-btn {
      background: rgba(0,0,0,0.6); border: 1.5px solid #3b82f6; color: #bbf0ff;
      font-family: 'Orbitron', monospace; font-weight: 600; padding: 0.5rem 1rem;
      border-radius: 2rem; cursor: pointer; transition: all 0.2s;
      backdrop-filter: blur(4px); font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px;
    }
    .cyber-btn:hover { background: #3b82f6cc; border-color: #00ffff; box-shadow: 0 0 12px #00a6ff; transform: translateY(-2px); }
    .cyber-btn.primary { background: linear-gradient(95deg, #6a11cb, #2575fc); border: none; }
    .lang-selector, .chain-selector {
      background: #0f1422dd; border: 1px solid #7e5eff; border-radius: 2rem;
      padding: 0.5rem; font-family: 'Orbitron', monospace; color: #caf0ff; cursor: pointer;
    }
    .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .neon-card {
      background: rgba(8,12,26,0.75); backdrop-filter: blur(8px); border-radius: 1.8rem;
      border: 1px solid #3b4effaa; box-shadow: 0 8px 20px rgba(0,0,0,0.6);
      padding: 1.2rem; transition: 0.2s;
    }
    .neon-card:hover { border-color: #00e0ff; box-shadow: 0 0 20px #2a6eff66; }
    .card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; border-left: 4px solid #b300ff; padding-left: 0.8rem; background: linear-gradient(120deg, #c084fc, #4facfe); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .price-ticker { background: #01051466; border-radius: 1rem; padding: 0.5rem; text-align: center; margin-bottom: 1rem; }
    .price { font-size: 1.8rem; font-weight: bold; color: #0cf; }
    .balance-amount { font-size: 2rem; font-weight: 800; color: #f0f; text-shadow: 0 0 6px #ff44ee; }
    .cyber-input { background: #010518; border: 1px solid #5f6eff; padding: 0.6rem; border-radius: 1rem; color: white; width: 100%; font-family: monospace; }
    .flex-btns { display: flex; gap: 0.8rem; margin-top: 0.5rem; }
    .staking-pool { background: #0a0e1f; border-radius: 1rem; padding: 0.8rem; margin-bottom: 0.8rem; border-left: 3px solid #a855f7; }
    .notification-badge { position: relative; cursor: pointer; }
    .badge-count { position: absolute; top: -8px; right: -8px; background: #ff0055; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; }
    .notification-panel { position: fixed; top: 80px; right: 20px; width: 320px; background: #0a0f1e; border: 1px solid #a855f7; border-radius: 1rem; padding: 1rem; z-index: 1000; display: none; backdrop-filter: blur(12px); max-height: 400px; overflow-y: auto; }
    .referral-code { background: #010518; padding: 0.5rem; border-radius: 1rem; text-align: center; margin-top: 0.5rem; }
    canvas { max-height: 180px; width: 100%; }
    .status-msg { font-size: 0.7rem; margin-top: 0.5rem; color: #bbf0ff; text-align: center; }
    .faq-item { margin-bottom: 0.8rem; border-bottom: 1px solid #2a49aa; padding-bottom: 0.5rem; }
    .faq-question { font-weight: bold; color: #0cf; cursor: pointer; }
    .faq-answer { font-size: 0.75rem; margin-top: 0.3rem; display: none; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.7rem; opacity: 0.7; }
    @media (max-width: 700px) { body { padding: 1rem; } }
  </style>
</head>

      <div class="flex-btns"><button id="copyAddressBtn" class="cyber-btn"><i class="far fa-copy"></i> <span data-i18n="copyBtn">Copy</span></button></div>
      <div class="explorer-link" style="margin-top:0.8rem;"><a href="https://bradicoin-api.onrender.com" target="_blank"><i class="fas fa-server"></i> <span data-i18n="apiLink">Bradicoin API (beta)</span></a></div>
    </div>

      <div id="stakingPoolsContainer"></div>
      <div id="stakeStatus" class="status-msg"></div>
    </div>

    <!-- Send/Receive & Referral -->
    <div class="neon-card">

      <input type="text" id="recipientAddr" class="cyber-input" placeholder="Recipient address">
      <input type="number" id="sendAmount" class="cyber-input" placeholder="Amount (BRD)" step="any">
      <button id="sendBtn" class="cyber-btn primary"><i class="fas fa-paper-plane"></i> <span data-i18n="sendBtn">Send BRD</span></button>
      <hr style="margin:0.8rem 0">
      <div class="card-title"><i class="fas fa-user-plus"></i> <span data-i18n="referralTitle">Referral Program</span></div>
      <div class="referral-code"><span data-i18n="yourCode">Your code:</span> <strong id="referralCode">LOADING</strong> <button id="copyReferralBtn" class="cyber-btn" style="padding:0.2rem 0.5rem;"><span data-i18n="copyCode">Copy</span></button></div>
      <div class="input-group"><label data-i18n="friendCodeLabel">Friend's code</label><input type="text" id="friendCode" class="cyber-input" placeholder="Enter referral code"></div>
      <button id="applyReferralBtn" class="cyber-btn"><span data-i18n="applyBtn">Apply & Earn 5%</span></button>
      <div id="referralBonus" class="status-msg"></div>
    </div>

    <!-- Performance Chart & FAQ -->
    <div class="neon-card">
      <div class="card-title"><i class="fas fa-chart-simple"></i> <span data-i18n="performanceTitle">Performance (7d)</span></div>
      <canvas id="priceChart" width="400" height="180"></canvas>
    </div>
    <div class="neon-card">
      <div class="card-title"><i class="fas fa-question-circle"></i> <span data-i18n="faqTitle">FAQ</span></div>
      <div id="faqContainer"></div>
    </div>
  </div>
  <footer><span data-i18n="footer">BRADICOIN ● 1 BRD = $10 USD ● Multi-Chain ● Staking 17% / 22% / 25% APR ● Referral Rewards</span></footer>
</div>

    }

  let currentLang = 'en';
  
  function updateUILanguage() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[currentLang][key]) {
        el.innerText = translations[currentLang][key];
      }
    });
    // Update placeholders
    const recipientInput = document.getElementById('recipientAddr');
    const sendAmountInput = document.getElementById('sendAmount');
    const friendCodeInput = document.getElementById('friendCode');
    if (recipientInput) recipientInput.placeholder = translations[currentLang].sendPlaceholder;
    if (sendAmountInput) sendAmountInput.placeholder = translations[currentLang].amountPlaceholder;
    if (friendCodeInput) friendCodeInput.placeholder = translations[currentLang].friendCodePlaceholder;
    // Update pool buttons dynamically if they exist
    document.querySelectorAll('.stake-pool-btn').forEach(btn => {
      const poolName = btn.getAttribute('data-pool-name');
      if (poolName) btn.innerHTML = `<i class="fas fa-lock"></i> ${translations[currentLang].stakeIn} ${poolName}`;
    });
  }

  // ==================== APP STATE (unchanged structure) ====================
  let wallet = { address: null, privateKey: null, balance: 1000.0 };
  let activeStakes = [];
  let airdropClaimed = false;
  let referralCode = "";
  let referredBy = null;
  let referralBonusEarned = 0;
  let notifications = [
    { text: "✨ Welcome to Bradicoin! 1 BRD = $10 USD", read: false },
    { text: "🔥 New 17% APR staking pool available!", read: false },
    { text: "🎁 Invite friends and earn 5% bonus", read: false }
  ];
  
  const stakingPools = [
    { id: 0, nameEn: "Standard Pool", namePt: "Pool Padrão", nameEs: "Pool Estándar", nameAr: "المجموعة القياسية", apr: 17, lockDays: 30, minStake: 10, color: "#3b82f6" },
    { id: 1, nameEn: "Advanced Pool", namePt: "Pool Avançado", nameEs: "Pool Avanzado", nameAr: "المجموعة المتقدمة", apr: 22, lockDays: 60, minStake: 50, color: "#a855f7" },
    { id: 2, nameEn: "Elite Pool", namePt: "Pool Elite", nameEs: "Pool Élite", nameAr: "المجموعة النخبة", apr: 25, lockDays: 90, minStake: 200, color: "#00f2ff" }
  ];
  
  function getPoolName(pool) {
    const names = { en: pool.nameEn, pt: pool.namePt, es: pool.nameEs, ar: pool.nameAr };
    return names[currentLang] || pool.nameEn;
  }
  
  function generateAddress() { return "0x" + Array(40).fill(0).map(() => Math.floor(Math.random()*16).toString(16)).join(''); }
  function generateReferralCode() { return "BRD" + Math.random().toString(36).substring(2, 8).toUpperCase(); }
  
  function saveToLocal() {
    localStorage.setItem('bradicoin_wallet', JSON.stringify({ address: wallet.address, privateKey: wallet.privateKey, balance: wallet.balance }));
    localStorage.setItem('bradicoin_stakes', JSON.stringify(activeStakes));
    localStorage.setItem('bradicoin_airdrop', airdropClaimed);
    localStorage.setItem('bradicoin_referral_code', referralCode);
    localStorage.setItem('bradicoin_referred_by', referredBy);
    localStorage.setItem('bradicoin_referral_bonus', referralBonusEarned);
    localStorage.setItem('bradicoin_lang', currentLang);
  }
  
  function loadFromLocal() {
    const w = localStorage.getItem('bradicoin_wallet'); if(w) { try { const p = JSON.parse(w); wallet = p; } catch(e) {} }
    const s = localStorage.getItem('bradicoin_stakes'); if(s) { try { activeStakes = JSON.parse(s); } catch(e) {} }
    const a = localStorage.getItem('bradicoin_airdrop'); if(a) airdropClaimed = a === 'true';
    const rc = localStorage.getItem('bradicoin_referral_code'); if(rc) referralCode = rc;
    const rb = localStorage.getItem('bradicoin_referred_by'); if(rb) referredBy = rb;
    const rBonus = localStorage.getItem('bradicoin_referral_bonus'); if(rBonus) referralBonusEarned = parseFloat(rBonus);
    const savedLang = localStorage.getItem('bradicoin_lang'); if(savedLang && translations[savedLang]) currentLang = savedLang;
    if(!wallet.address) createNewWallet();
    if(!referralCode) referralCode = generateReferralCode();
    document.getElementById('referralCode').innerText = referralCode;
    document.getElementById('languageSwitcher').value = currentLang;
    updateUILanguage();
    updateUI();
  }
  
  function createNewWallet() {
    wallet = { address: generateAddress(), privateKey: "priv_" + Math.random().toString(36), balance: 1000 };
    activeStakes = [];
    airdropClaimed = false;
    referralCode = generateReferralCode();
    referredBy = null;
    referralBonusEarned = 0;
    saveToLocal();
    addNotification(translations[currentLang].airdropSuccess || "🎉 New wallet created!");
    updateUI();
  }
  
  function importWallet(key) { if(!key) return; let addr = "0x" + key.replace(/[^a-z0-9]/gi,'').substring(0,40); if(addr.length<10) addr = generateAddress(); wallet = { address: addr, privateKey: key, balance: 1250 }; activeStakes = []; airdropClaimed = false; referralCode = generateReferralCode(); saveToLocal(); addNotification("🔐 Wallet imported successfully!"); updateUI(); }
  function logout() { localStorage.clear(); wallet = { address:null, privateKey:null, balance:0 }; activeStakes = []; airdropClaimed = false; referralCode = ""; updateUI(); addNotification("Logged out."); }
  
  function calculateReward(amount, apr, lockDays) { return amount * (apr / 100) * (lockDays / 365); }
  
  function stake(amount, pool) {
    if (amount <= 0 || amount > wallet.balance) { showStatus(translations[currentLang].invalidAmount, 'stakeStatus'); return false; }
    if (amount < pool.minStake) { showStatus(`${translations[currentLang].minStakeError} ${pool.minStake} BRD`, 'stakeStatus'); return false; }
    const lockEnd = Date.now() + (pool.lockDays * 86400000);
    activeStakes.push({ poolId: pool.id, amount: amount, lockEndTime: lockEnd, periodDays: pool.lockDays, apr: pool.apr });
    wallet.balance -= amount;
    saveToLocal();
    addNotification(`🔒 Staked ${amount} BRD in ${getPoolName(pool)} (${pool.apr}% APR) for ${pool.lockDays} days`);
    updateUI();
    showStatus(`Staked ${amount} BRD in ${getPoolName(pool)} pool!`, 'stakeStatus');
    return true;
  }
  
  function unstake(index) {
    const stake = activeStakes[index];
    if (!stake) return;
    if (Date.now() < stake.lockEndTime) { showStatus(translations[currentLang].stakeLocked, 'stakeStatus'); return; }
    const reward = calculateReward(stake.amount, stake.apr, stake.periodDays);
    wallet.balance += stake.amount + reward;
    activeStakes.splice(index, 1);
    saveToLocal();
    addNotification(`✅ Unstaked ${stake.amount} BRD + ${reward.toFixed(4)} reward (${stake.apr}% APR)`);
    updateUI();
    showStatus(`${translations[currentLang].unstakeSuccess} +${reward.toFixed(4)} BRD`, 'stakeStatus');
  }
  
  function sendCoins(to, amt) { if(!to || amt<=0 || amt>wallet.balance) { showStatus(translations[currentLang].invalidAmount,'txStatus'); return; } wallet.balance -= amt; saveToLocal(); updateUI(); addNotification(`💸 ${translations[currentLang].sentMsg} ${amt} BRD to ${to.substring(0,10)}...`); showStatus(`${translations[currentLang].sentMsg} ${amt} BRD`,'txStatus'); }
  function claimAirdrop() { if(airdropClaimed) { showStatus(translations[currentLang].airdropClaimedMsg,'airdropStatus'); return; } wallet.balance += 250; airdropClaimed=true; saveToLocal(); updateUI(); addNotification(translations[currentLang].airdropSuccess); showStatus(translations[currentLang].airdropSuccess,'airdropStatus'); }
  
  function applyReferral(code) { if(referredBy) { showStatus("You already used a referral code!",'referralBonus'); return; } if(code === referralCode) { showStatus(translations[currentLang].referralSelfError,'referralBonus'); return; } referredBy = code; referralBonusEarned = 50; wallet.balance += 50; saveToLocal(); updateUI(); addNotification(translations[currentLang].referralApplied); showStatus(translations[currentLang].referralApplied,'referralBonus'); }
  function copyReferral() { navigator.clipboard.writeText(referralCode); showStatus(translations[currentLang].copiedMsg,'referralBonus'); }
  
  function addNotification(text) { notifications.unshift({ text, read: false }); if(notifications.length > 10) notifications.pop(); updateNotificationUI(); }
  function updateNotificationUI() { const unread = notifications.filter(n => !n.read).length; document.getElementById('notifCount').innerText = unread; const container = document.getElementById('notifList'); if(container) container.innerHTML = notifications.map(n => `<div style="padding:0.5rem; border-bottom:1px solid #333; font-size:0.75rem;">${n.text}</div>`).join(''); }
  function toggleNotifications() { const panel = document.getElementById('notificationPanel'); panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex'; notifications.forEach(n=>n.read=true); updateNotificationUI(); }
  
  let priceChart;
  function initChart() { const ctx = document.getElementById('priceChart').getContext('2d'); priceChart = new Chart(ctx, { type: 'line', data: { labels: ['Day1','Day2','Day3','Day4','Day5','Day6','Day7'], datasets: [{ label: 'BRD Price (USD)', data: [9.85, 9.92, 10.01, 9.98, 10.05, 10.02, 10.00], borderColor: '#0cf', backgroundColor: 'rgba(0,204,255,0.1)', fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e0e5ff' } } } } }); }
  
  function initFAQ() { const faqData = [{ q:"What is Bradicoin?", a:"Bradicoin (BRD) is a cyberpunk-themed cryptocurrency. 1 BRD = $10 USD fixed value." },{ q:"How does staking work?", a:"Stake BRD in pools: 17% (30d), 22% (60d), or 25% (90d) APR. Rewards auto-calculated." },{ q:"Multi-chain support?", a:"Bridge BRD across Bitcoin, Ethereum, Solana, Binance, Polygon & Arbitrum." },{ q:"Referral program?", a:"Share your code. Friends get 5% bonus, you earn 5% of their stakes." }]; const container = document.getElementById('faqContainer'); container.innerHTML = faqData.map((f,i) => `<div class="faq-item"><div class="faq-question" data-idx="${i}">❓ ${f.q}</div><div class="faq-answer" id="faqAns${i}">${f.a}</div></div>`).join(''); document.querySelectorAll('.faq-question').forEach(el => { el.addEventListener('click', () => { const idx = el.dataset.idx; const ans = document.getElementById(`faqAns${idx}`); ans.style.display = ans.style.display === 'block' ? 'none' : 'block'; }); }); }
  
  function renderStakingPools() {
    const container = document.getElementById('stakingPoolsContainer');
    if(!container) return;
    container.innerHTML = stakingPools.map(pool => `
      <div class="staking-pool" style="border-left-color: ${pool.color}">
        <div style="display:flex; justify-content:space-between;"><strong>${getPoolName(pool)}</strong><span style="color:#0cf;">${pool.apr}% APR</span></div>
        <div style="font-size:0.7rem;">${translations[currentLang].lockDays}: ${pool.lockDays} days | ${translations[currentLang].minStake}: ${pool.minStake} BRD</div>
        <div class="input-group" style="margin-top:0.5rem;"><input type="number" id="stakeAmount_${pool.id}" class="cyber-input" placeholder="${translations[currentLang].amountPlaceholder}" step="any"></div>
        <button class="cyber-btn stake-pool-btn" data-id="${pool.id}" data-pool-name="${getPoolName(pool)}" style="width:100%; margin-top:0.5rem;"><i class="fas fa-lock"></i> ${translations[currentLang].stakeIn} ${getPoolName(pool)}</button>
      </div>
    `).join('');
    document.querySelectorAll('.stake-pool-btn').forEach(btn => {
      btn.addEventListener('click', (e) => { const poolId = parseInt(btn.dataset.id); const pool = stakingPools.find(p => p.id === poolId); const amountInput = document.getElementById(`stakeAmount_${poolId}`); const amount = parseFloat(amountInput.value); if(!isNaN(amount) && amount>0) stake(amount, pool); else showStatus(translations[currentLang].invalidAmount,'stakeStatus'); });
    });
  }
  
  function renderActiveStakes() { /* keep existing functionality */ }
  function updateUI() {
    document.getElementById('bradicoinBalance').innerText = wallet.balance.toFixed(4);
    document.getElementById('walletAddressDisplay').innerText = wallet.address || translations[currentLang].noWallet;
    document.getElementById('brdPrice').innerHTML = `$${10.00}`;
    renderStakingPools();
    if(priceChart) { priceChart.data.datasets[0].data = [9.85,9.92,10.01,9.98,10.05,10.02,10.00]; priceChart.update(); }
  }
  function showStatus(msg, elId) { const el = document.getElementById(elId); if(el) { el.innerText = msg; setTimeout(()=>{ if(el.innerText===msg) el.innerText=""; },4000); } }
  function copyAddress() { if(wallet.address) { navigator.clipboard.writeText(wallet.address); showStatus(translations[currentLang].copiedMsg,'txStatus'); } }
  
  // Event Listeners
  document.getElementById('createWalletBtn').onclick = createNewWallet;
  document.getElementById('importWalletBtn').onclick = () => { const k = prompt("Enter private key:"); if(k) importWallet(k); };
  document.getElementById('logoutBtn').onclick = logout;
  document.getElementById('sendBtn').onclick = () => sendCoins(document.getElementById('recipientAddr').value, parseFloat(document.getElementById('sendAmount').value));
  document.getElementById('copyAddressBtn').onclick = copyAddress;
  document.getElementById('copyReferralBtn').onclick = copyReferral;
  document.getElementById('applyReferralBtn').onclick = () => { const code = document.getElementById('friendCode').value; if(code) applyReferral(code); else showStatus("Enter a code",'referralBonus'); };
  document.getElementById('notificationBell').onclick = toggleNotifications;
  document.getElementById('languageSwitcher').onchange = (e) => { currentLang = e.target.value; updateUILanguage(); renderStakingPools(); saveToLocal(); };
  document.getElementById('chainSelector').onchange = (e) => { addNotification(`🔄 Switched to ${e.target.value} network.`); };
  
  // Add airdrop button if missing
  if(!document.getElementById('claimAirdropBtn')) {
    const sendCard = document.querySelector('.neon-card:nth-child(3)');
    if(sendCard) { const airdropDiv = document.createElement('div'); airdropDiv.innerHTML = `<button id="claimAirdropBtn" class="cyber-btn primary" style="margin-top:1rem;"><i class="fas fa-gift"></i> <span data-i18n="claimAirdropBtn">Claim Airdrop (250 BRD)</span></button><div id="airdropStatus" class="status-msg"></div>`; sendCard.appendChild(airdropDiv); document.getElementById('claimAirdropBtn').onclick = claimAirdrop; }
  }
  if(!document.getElementById('receiveAddrDisplay')) {
    const sendCard = document.querySelector('.neon-card:nth-child(3)');
    if(sendCard) { const receiveDiv = document.createElement('div'); receiveDiv.className = 'input-group'; receiveDiv.innerHTML = '<label data-i18n="receiveAddressLabel">Your receive address:</label><div class="cyber-input" id="receiveAddrDisplay">—</div><button id="receiveCopyBtn" class="cyber-btn"><i class="fas fa-qrcode"></i> <span data-i18n="copyReceiveBtn">Copy Address</span></button>'; sendCard.insertBefore(receiveDiv, sendCard.querySelector('hr')?.nextSibling || sendCard.lastChild); document.getElementById('receiveCopyBtn').onclick = copyAddress; }
  }
  
  loadFromLocal(); initChart(); initFAQ(); updateUI();
  setInterval(() => { updateUI(); saveToLocal(); }, 2000);
</script>
</body>
</html>
